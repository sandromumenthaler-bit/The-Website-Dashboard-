<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Military Tycoon Dex Bot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
</head>
<body>
    <div class="header">
        <button id="settingsBtn" class="settings-btn">Settings</button>
        <div id="settingsDropdown" class="dropdown-content">
            {% if not current_user.is_authenticated %}
            <button onclick="showLogin()">Login</button>
            {% else %}
            <button onclick="showSection('bot-status')">Bot Status</button>
            <button onclick="showSection('edit-images')">Edit Images</button>
            <button onclick="showSection('edit-user')">Edit User</button>
            <a href="{{ url_for('logout') }}"><button>Logout</button></a>
            {% endif %}
        </div>
    </div>

    <div class="main-content">
        <div id="landingScreen">
            <h1 id="mainTitle">Military Tycoon dex bot</h1>
            <div style="margin-top: 50px;">
                <a href="https://discord.com/oauth2/authorize?client_id=1249395912019542056&permissions=8515702525261888&integration_type=0&scope=bot" target="_blank">
                    <button style="padding: 15px 30px; font-size: 1.2em; background: #5865F2; color: white; border: none; border-radius: 5px; cursor: pointer;">Get the Dex Bot</button>
                </a>
            </div>
        </div>

        <div id="loginSection" class="section" style="display:none;">
            <h2>Login</h2>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <input type="text" name="username" placeholder="Username" required><br>
                <input type="password" name="password" placeholder="Password" required><br>
                <button type="submit">Login</button>
            </form>
            <div id="loginError" style="color: #ff4d4d; margin-top: 10px; display: none; font-weight: bold;"></div>
        </div>

        {% if current_user.is_authenticated %}
        <div id="bot-status" class="section admin-section" style="display:none;">
            <h2>Bot Status</h2>
            <div id="botStatusCard" style="margin-top: 10px; padding: 20px; border-radius: 6px; background: #333; border: 1px solid #555;">
                <div style="font-size: 0.95em; color: #bbb;">Current bot state</div>
                <div id="botStatusText" style="margin-top: 10px; font-size: 1.2em; font-weight: bold; color: #ffc107;">Checking...</div>
            </div>
            <div style="margin-top: 15px;">
                <button onclick="updateBotStatus(false)">Refresh Status</button>
                <button onclick="runBot()" style="background: #28a745; margin-left: 8px;">Run Bot</button>
            </div>
            <div id="botActionStatus" style="margin-top: 10px; color: #ccc; font-size: 0.95em;"></div>
        </div>

        <div id="edit-images" class="section admin-section" style="display:none;">
            <h2>Edit Images</h2>
            <button id="addImageBtn" onclick="showAddImageForm()">Add New Image</button>
            <div id="addImageForm" style="display:none; border: 1px solid #555; padding: 15px; margin-top: 10px; background: #222;">
                <h3 id="imageFormTitle">Add New Image</h3>
                <input type="hidden" id="editOldName">
                <div style="margin-bottom: 10px;">
                    <label>Vehicle Name: </label><br>
                    <input type="text" id="newImageName" style="width: 100%; padding: 5px; background: #333; color: white; border: 1px solid #555;">
                </div>
                <div style="margin-bottom: 10px;">
                    <label>Rarity: </label><br>
                    <input type="text" id="newImageRarity" style="width: 100%; padding: 5px; background: #333; color: white; border: 1px solid #555;">
                </div>
                <div style="margin-bottom: 10px;">
                    <label>Image File: </label><br>
                    <input type="file" id="newImageFile" style="width: 100%; color: white;">
                </div>
                <button id="imageFormSubmit" onclick="addImage()">Add</button>
                <button onclick="hideImageForm()" style="background: #555;">Cancel</button>
            </div>
            <div id="imageList" style="display: flex; flex-wrap: wrap; gap: 20px; margin-top: 20px;">
                <!-- Images will be loaded here -->
            </div>
        </div>

        <div id="edit-user" class="section admin-section" style="display:none;">
            <h2>Edit User</h2>
            <form action="{{ url_for('update_user') }}" method="POST">
                <input type="text" name="new_username" placeholder="New Username" required>
                <input type="password" name="new_password" placeholder="New Password" required>
                <button type="submit">Update Credentials</button>
            </form>
        </div>
        {% endif %}
    </div>

    <script>
        const socket = io();
        let botStatusInterval = null;

        document.getElementById('settingsBtn').onclick = function() {
            document.getElementById('settingsDropdown').classList.toggle('show');
        }

        window.onclick = function(event) {
            if (!event.target.matches('.settings-btn')) {
                var dropdowns = document.getElementsByClassName("dropdown-content");
                for (var i = 0; i < dropdowns.length; i++) {
                    var openDropdown = dropdowns[i];
                    if (openDropdown.classList.contains('show')) {
                        openDropdown.classList.remove('show');
                    }
                }
            }
        }

        function showLogin() {
            hideAllSections();
            document.getElementById('landingScreen').style.display = 'none';
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('loginError').style.display = 'none';
        }

        function handleLogin(event) {
            event.preventDefault();
            const form = event.target;
            const formData = new FormData(form);
            const errorDiv = document.getElementById('loginError');
            errorDiv.style.display = 'none';

            fetch('/login', {
                method: 'POST',
                body: formData
            }).then(r => {
                if (r.ok || r.status === 401) {
                    return r.json();
                }
                throw new Error('Network response was not ok');
            }).then(data => {
                if (data.status === 'success') {
                    window.location.reload();
                } else {
                    errorDiv.innerText = data.message;
                    errorDiv.style.display = 'block';
                }
            }).catch(err => {
                errorDiv.innerText = 'wrong user/password';
                errorDiv.style.display = 'block';
            });
        }

        function hideAllSections() {
            const sections = document.querySelectorAll('.section');
            sections.forEach(s => s.style.display = 'none');
            document.getElementById('landingScreen').style.display = 'none';
            if (botStatusInterval) {
                clearInterval(botStatusInterval);
                botStatusInterval = null;
            }
        }

        function showSection(id) {
            hideAllSections();
            document.getElementById(id).style.display = 'block';
            if (id === 'edit-images') loadChildren();
            if (id === 'bot-status') updateBotStatus(true);
        }

        {% if current_user.is_authenticated %}
        function runBot() {
            const statusEl = document.getElementById('botActionStatus');
            statusEl.textContent = 'Starting bot...';
            statusEl.style.color = '#ccc';
            fetch('/run_bot', {method: 'POST'})
                .then(async r => {
                    let data = {};
                    try {
                        data = await r.json();
                    } catch (_) {}
                    if (!r.ok) {
                        throw new Error(data.status || ('HTTP ' + r.status));
                    }
                    statusEl.textContent = data.status || 'Done';
                    statusEl.style.color = '#d4edda';
                    updateBotStatus(false);
                })
                .catch(err => {
                    statusEl.textContent = err.message || 'Failed to start bot.';
                    statusEl.style.color = '#f8d7da';
                });
        }

        function updateBotStatus(autoRefresh) {
            const textEl = document.getElementById('botStatusText');
            if (!textEl) return;

            fetch('/bot_status')
                .then(r => r.json())
                .then(data => {
                    if (data.running) {
                        textEl.textContent = 'Online';
                        textEl.style.color = '#28a745';
                    } else {
                        textEl.textContent = 'Offline';
                        textEl.style.color = '#ff4d4d';
                    }
                }).catch(() => {
                    textEl.textContent = 'Offline';
                    textEl.style.color = '#ff4d4d';
                });

            if (autoRefresh && !botStatusInterval) {
                botStatusInterval = setInterval(() => updateBotStatus(false), 5000);
            }
        }

        function loadChildren() {
            fetch('/get_children')
                .then(r => r.json())
                .then(data => {
                    const list = document.getElementById('imageList');
                    list.innerHTML = '';
                    for (const [name, info] of Object.entries(data)) {
                        const div = document.createElement('div');
                        div.className = 'image-item';
                        div.style.border = '1px solid #555';
                        div.style.padding = '10px';
                        div.style.width = '150px';
                        div.style.textAlign = 'center';

                        if (info.pic_link) {
                            const img = document.createElement('img');
                            img.src = info.pic_link;
                            img.style.width = '100px';
                            img.style.height = 'auto';
                            img.style.display = 'block';
                            img.style.margin = '0 auto 5px auto';
                            img.style.borderRadius = '5px';
                            div.appendChild(img);
                        }

                        const title = document.createElement('strong');
                        title.innerText = name;
                        div.appendChild(title);
                        div.appendChild(document.createElement('br'));

                        const raritySpan = document.createElement('span');
                        raritySpan.style.fontSize = '0.9em';
                        raritySpan.style.color = '#ccc';
                        raritySpan.innerText = info.rarity || '';
                        div.appendChild(raritySpan);
                        div.appendChild(document.createElement('br'));

                        const btnWrap = document.createElement('div');
                        btnWrap.style.marginTop = '10px';
                        btnWrap.style.display = 'flex';
                        btnWrap.style.gap = '5px';
                        btnWrap.style.justifyContent = 'center';

                        const delBtn = document.createElement('button');
                        delBtn.innerText = 'Delete';
                        delBtn.style.background = '#dc3545';
                        delBtn.style.padding = '5px 10px';
                        delBtn.onclick = () => deleteImage(name);

                        const editBtn = document.createElement('button');
                        editBtn.innerText = 'Edit';
                        editBtn.style.background = '#ffc107';
                        editBtn.style.color = 'black';
                        editBtn.style.padding = '5px 10px';
                        editBtn.onclick = () => showEditImageForm(name, info.rarity || '');

                        btnWrap.appendChild(delBtn);
                        btnWrap.appendChild(editBtn);
                        div.appendChild(btnWrap);
                        list.appendChild(div);
                    }
                });
        }

        function showAddImageForm() {
            document.getElementById('imageFormTitle').innerText = 'Add New Image';
            document.getElementById('editOldName').value = '';
            document.getElementById('newImageName').value = '';
            document.getElementById('newImageRarity').value = '';
            document.getElementById('imageFormSubmit').innerText = 'Add';
            document.getElementById('addImageForm').style.display = 'block';
        }

        function showEditImageForm(name, rarity) {
            document.getElementById('imageFormTitle').innerText = 'Edit Image: ' + name;
            document.getElementById('editOldName').value = name;
            document.getElementById('newImageName').value = name;
            document.getElementById('newImageRarity').value = rarity;
            document.getElementById('imageFormSubmit').innerText = 'Save Changes';
            document.getElementById('addImageForm').style.display = 'block';
        }

        function hideImageForm() {
            document.getElementById('addImageForm').style.display = 'none';
        }

        function addImage() {
            const oldName = document.getElementById('editOldName').value;
            const name = document.getElementById('newImageName').value;
            const rarity = document.getElementById('newImageRarity').value;
            const fileInput = document.getElementById('newImageFile');

            const formData = new FormData();
            formData.append('new_name', name);
            formData.append('rarity', rarity);
            if (fileInput.files[0]) {
                formData.append('file', fileInput.files[0]);
            }

            let url = '/add_image';
            if (oldName) {
                url = '/edit_image';
                formData.append('old_name', oldName);
            } else {
                formData.append('name', name); // /add_image expects 'name'
            }

            fetch(url, {
                method: 'POST',
                body: formData
            }).then(r => r.json()).then(data => {
                alert(data.status);
                loadChildren();
                hideImageForm();
            });
        }

        function deleteImage(name) {
            if (confirm('Delete ' + name + '?')) {
                fetch('/delete_image', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({name: name})
                }).then(r => r.json()).then(data => {
                    alert(data.status);
                    loadChildren();
                });
            }
        }

        function editImagePrompt(name, currentRarity) {
            const newName = prompt('New name for ' + name, name);
            const newRarity = prompt('New rarity for ' + name, currentRarity);
            if (newName && newRarity) {
                fetch('/edit_image', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({old_name: name, new_name: newName, rarity: newRarity})
                }).then(r => r.json()).then(data => {
                    alert(data.status);
                    loadChildren();
                });
            }
        }
        {% endif %}
    </script>
</body>
</html>
