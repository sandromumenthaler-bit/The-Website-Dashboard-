<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Military Tycoon Dex Bot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="header">
        <button id="settingsBtn" class="settings-btn">Settings</button>
        <div id="settingsDropdown" class="dropdown-content">
            {% if not current_user.is_authenticated %}
            <button onclick="showLogin()">Login</button>
            {% else %}
            <button onclick="showSection('edit-script')">Edit Script</button>
            <button onclick="showSection('edit-images')">Edit Images</button>
            <button onclick="showSection('edit-user')">Edit User</button>
            <a href="{{ url_for('logout') }}"><button>Logout</button></a>
            {% endif %}
        </div>
    </div>

    <div class="main-content">
        <div id="landingScreen">
            <h1 id="mainTitle">Military Tycoon dex bot</h1>
            <div style="margin-top: 50px;">
                <a href="https://discord.com/oauth2/authorize?client_id=1249395912019542056&permissions=8515702525261888&integration_type=0&scope=bot" target="_blank">
                    <button style="padding: 15px 30px; font-size: 1.2em; background: #5865F2; color: white; border: none; border-radius: 5px; cursor: pointer;">Get the Dex Bot</button>
                </a>
            </div>
        </div>
        
        <div id="loginSection" class="section" style="display:none;">
            <h2>Login</h2>
            <form action="{{ url_for('login') }}" method="POST">
                <input type="text" name="username" placeholder="Username" required><br>
                <input type="password" name="password" placeholder="Password" required><br>
                <button type="submit">Login</button>
            </form>
        </div>

        {% if current_user.is_authenticated %}
        <div id="edit-script" class="section admin-section" style="display:none;">
            <h2>File Editor</h2>
            <div style="margin-bottom: 10px;">
                <label>Select File: </label>
                <select id="fileSelector" onchange="loadScript()" style="padding: 5px; background: #333; color: #fff; border: 1px solid #555;"></select>
            </div>
            <div style="margin-bottom: 10px; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;">
                <input type="text" id="newFilePath" placeholder="new_folder/new_file.txt" style="min-width: 260px;">
                <button onclick="addFileToEditor()">Add File</button>
                <button onclick="deleteSelectedFile()" style="background: #dc3545;">Delete Selected File</button>
            </div>
            <textarea id="scriptEditor" style="width:100%; height:400px; font-family: monospace;"></textarea><br>
            <div style="margin-top: 10px; display: flex; gap: 10px;">
                <button onclick="saveScript()">Save File</button>
                <button onclick="pushAllToGithub()" style="background: #28a745;">Push All to GitHub</button>
            </div>
            <div id="saveStatus" style="margin-top: 10px; padding: 10px; display: none; border-radius: 4px; font-weight: bold;"></div>
            <p style="font-size: 0.8em; color: #aaa;">Use "Push All to GitHub" to sync file additions/removals and image changes.</p>
        </div>

        <div id="edit-images" class="section admin-section" style="display:none;">
            <h2>Edit Images</h2>
            <button id="addImageBtn" onclick="showAddImageForm()">Add New Image</button>
            <div id="addImageForm" style="display:none; border: 1px solid #555; padding: 15px; margin-top: 10px; background: #222;">
                <h3 id="imageFormTitle">Add New Image</h3>
                <input type="hidden" id="editOldName">
                <div style="margin-bottom: 10px;">
                    <label>Vehicle Name: </label><br>
                    <input type="text" id="newImageName" style="width: 100%; padding: 5px; background: #333; color: white; border: 1px solid #555;">
                </div>
                <div style="margin-bottom: 10px;">
                    <label>Rarity: </label><br>
                    <input type="text" id="newImageRarity" style="width: 100%; padding: 5px; background: #333; color: white; border: 1px solid #555;">
                </div>
                <div style="margin-bottom: 10px;">
                    <label>Image File: </label><br>
                    <input type="file" id="newImageFile" accept="image/*" style="width: 100%; color: white;">
                </div>
                <button id="imageFormSubmit" onclick="addImage()">Add</button>
                <button onclick="hideImageForm()" style="background: #555;">Cancel</button>
            </div>
            <div id="imageList" style="display: flex; flex-wrap: wrap; gap: 20px; margin-top: 20px;">
                <!-- Images will be loaded here -->
            </div>
        </div>

        <div id="edit-user" class="section admin-section" style="display:none;">
            <h2>Edit User</h2>
            <form action="{{ url_for('update_user') }}" method="POST">
                <input type="text" name="new_username" placeholder="New Username" required>
                <input type="password" name="new_password" placeholder="New Password" required>
                <button type="submit">Update Credentials</button>
            </form>
        </div>
        {% endif %}
    </div>

    <script>
        document.getElementById('settingsBtn').onclick = function() {
            document.getElementById('settingsDropdown').classList.toggle('show');
        }

        window.onclick = function(event) {
            if (!event.target.matches('.settings-btn')) {
                var dropdowns = document.getElementsByClassName("dropdown-content");
                for (var i = 0; i < dropdowns.length; i++) {
                    var openDropdown = dropdowns[i];
                    if (openDropdown.classList.contains('show')) {
                        openDropdown.classList.remove('show');
                    }
                }
            }
        }

        function showLogin() {
            hideAllSections();
            document.getElementById('landingScreen').style.display = 'none';
            document.getElementById('loginSection').style.display = 'block';
        }

        function hideAllSections() {
            const sections = document.querySelectorAll('.section');
            sections.forEach(s => s.style.display = 'none');
            document.getElementById('landingScreen').style.display = 'none';
        }

        function showSection(id) {
            hideAllSections();
            document.getElementById(id).style.display = 'block';
            if (id === 'edit-script') {
                loadFileList();
                loadScript();
            }
            if (id === 'edit-images') loadChildren();
        }

        {% if current_user.is_authenticated %}
        function loadFileList() {
            fetch('/list_files')
                .then(r => r.json())
                .then(data => {
                    const selector = document.getElementById('fileSelector');
                    const currentVal = selector.value;
                    selector.innerHTML = '';
                    data.files.forEach(file => {
                        const opt = document.createElement('option');
                        opt.value = file;
                        opt.innerText = file;
                        selector.appendChild(opt);
                    });
                    if (currentVal && data.files.includes(currentVal)) {
                        selector.value = currentVal;
                    }
                    if (!selector.value && data.files.length > 0) {
                        selector.value = data.files[0];
                    }
                });
        }

        function loadScript() {
            const filename = document.getElementById('fileSelector').value || 'bot.py';
            fetch('/get_script?file=' + filename)
                .then(r => r.json())
                .then(data => {
                    document.getElementById('scriptEditor').value = data.content || data.error;
                });
        }

        function saveScript() {
            const content = document.getElementById('scriptEditor').value;
            const filename = document.getElementById('fileSelector').value || 'bot.py';
            const statusDiv = document.getElementById('saveStatus');

            statusDiv.style.display = 'block';
            statusDiv.style.background = '#333';
            statusDiv.style.color = '#fff';
            statusDiv.textContent = 'Saving file...';

            fetch('/save_script', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({content: content, file: filename, push: false})
            }).then(r => r.json()).then(data => {
                statusDiv.textContent = data.status;
                if (data.status.includes('error')) {
                    statusDiv.style.background = '#721c24';
                    statusDiv.style.color = '#f8d7da';
                } else {
                    statusDiv.style.background = '#155724';
                    statusDiv.style.color = '#d4edda';
                }
                setTimeout(() => {
                    statusDiv.style.display = 'none';
                }, 5000);
            }).catch(err => {
                statusDiv.textContent = 'Error: ' + err;
                statusDiv.style.background = '#721c24';
                statusDiv.style.color = '#f8d7da';
            });
        }

        function addFileToEditor() {
            const input = document.getElementById('newFilePath');
            const filePath = (input.value || '').trim();
            if (!filePath) {
                alert('Enter a file path first.');
                return;
            }

            fetch('/add_file', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({file: filePath})
            }).then(r => r.json()).then(data => {
                alert(data.status);
                input.value = '';
                loadFileList();
                setTimeout(() => {
                    const selector = document.getElementById('fileSelector');
                    if (data.files && data.files.includes(filePath)) {
                        selector.value = filePath;
                    }
                    loadScript();
                }, 100);
            });
        }

        function deleteSelectedFile() {
            const selector = document.getElementById('fileSelector');
            const filePath = selector.value;
            if (!filePath) {
                alert('No file selected.');
                return;
            }
            if (!confirm('Delete file "' + filePath + '"? This also queues deletion on GitHub when you push all.')) {
                return;
            }

            fetch('/delete_file', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({file: filePath})
            }).then(r => r.json()).then(data => {
                alert(data.status);
                loadFileList();
                setTimeout(loadScript, 100);
            });
        }

        function pushAllToGithub() {
            if (!confirm('Are you sure you want to push ALL saved files and images to GitHub? This will restart your Bot service.')) return;
            
            const statusDiv = document.getElementById('saveStatus');
            statusDiv.style.display = 'block';
            statusDiv.style.background = '#333';
            statusDiv.style.color = '#fff';
            statusDiv.textContent = 'Pushing to GitHub (this may take a moment)...';

            fetch('/push_all_to_github', {
                method: 'POST'
            }).then(r => r.json()).then(data => {
                statusDiv.textContent = data.status;
                if (data.status.includes('error') || data.status.includes('not set') || data.status.includes('Error')) {
                    statusDiv.style.background = '#721c24';
                    statusDiv.style.color = '#f8d7da';
                } else {
                    statusDiv.style.background = '#155724';
                    statusDiv.style.color = '#d4edda';
                }
                setTimeout(() => {
                    statusDiv.style.display = 'none';
                }, 8000);
            }).catch(err => {
                statusDiv.textContent = 'Error: ' + err;
                statusDiv.style.background = '#721c24';
                statusDiv.style.color = '#f8d7da';
            });
        }

        // Add Ctrl+S support for the editor
        document.getElementById('scriptEditor').addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 's') {
                e.preventDefault();
                saveScript();
            }
        });

        function loadChildren() {
            fetch('/get_children')
                .then(r => r.json())
                .then(data => {
                    const list = document.getElementById('imageList');
                    list.innerHTML = '';
                    for (const [name, info] of Object.entries(data)) {
                        const safeName = name.replace(/'/g, "\\'");
                        const safeRarity = (info.rarity || '').replace(/'/g, "\\'");
                        const imageSrc = info.pic_link ? `${info.pic_link}?v=${Date.now()}` : '';
                        const div = document.createElement('div');
                        div.className = 'image-item';
                        div.style.border = '1px solid #555';
                        div.style.padding = '10px';
                        div.style.width = '150px';
                        div.style.textAlign = 'center';
                        div.innerHTML = `
                            ${imageSrc ? `<img src="${imageSrc}" style="width:100px; height:auto; display:block; margin: 0 auto 5px auto; border-radius:5px;">` : ''}
                            <strong>${name}</strong><br>
                            <span style="font-size: 0.9em; color: #ccc;">${info.rarity}</span><br>
                            <div style="margin-top: 10px; display: flex; gap: 5px; justify-content: center;">
                                <button onclick="deleteImage('${safeName}')" style="background: #dc3545; padding: 5px 10px;">Delete</button>
                                <button onclick="showEditImageForm('${safeName}', '${safeRarity}')" style="background: #ffc107; color: black; padding: 5px 10px;">Edit</button>
                            </div>
                        `;
                        list.appendChild(div);
                    }
                });
        }

        function showAddImageForm() {
            document.getElementById('imageFormTitle').innerText = 'Add New Image';
            document.getElementById('editOldName').value = '';
            document.getElementById('newImageName').value = '';
            document.getElementById('newImageRarity').value = '';
            document.getElementById('newImageFile').value = '';
            document.getElementById('imageFormSubmit').innerText = 'Add';
            document.getElementById('addImageForm').style.display = 'block';
        }

        function showEditImageForm(name, rarity) {
            document.getElementById('imageFormTitle').innerText = 'Edit Image: ' + name;
            document.getElementById('editOldName').value = name;
            document.getElementById('newImageName').value = name;
            document.getElementById('newImageRarity').value = rarity;
            document.getElementById('newImageFile').value = '';
            document.getElementById('imageFormSubmit').innerText = 'Save Changes';
            document.getElementById('addImageForm').style.display = 'block';
        }

        function hideImageForm() {
            document.getElementById('addImageForm').style.display = 'none';
        }

        function addImage() {
            const oldName = document.getElementById('editOldName').value;
            const name = document.getElementById('newImageName').value;
            const rarity = document.getElementById('newImageRarity').value;
            const fileInput = document.getElementById('newImageFile');
            
            const formData = new FormData();
            formData.append('new_name', name);
            formData.append('rarity', rarity);
            if (fileInput.files[0]) {
                formData.append('file', fileInput.files[0]);
            }

            let url = '/add_image';
            if (oldName) {
                url = '/edit_image';
                formData.append('old_name', oldName);
            } else {
                formData.append('name', name); // /add_image expects 'name'
            }

            fetch(url, {
                method: 'POST',
                body: formData
            }).then(r => r.json()).then(data => {
                alert(data.status);
                if (data.status && !data.status.toLowerCase().includes('required') && !data.status.toLowerCase().includes('unsupported')) {
                    loadChildren();
                    hideImageForm();
                }
            });
        }

        function deleteImage(name) {
            if (confirm('Delete ' + name + '?')) {
                fetch('/delete_image', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({name: name})
                }).then(r => r.json()).then(data => {
                    alert(data.status);
                    loadChildren();
                });
            }
        }

        {% endif %}
    </script>
</body>
</html>
